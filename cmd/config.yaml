applications:
  ctix:
    base_url: "CTIX Base URL"
    # Example URL : "https://demo.cyware.com/ctix/"
    auth:
      # type: "basic"
      # username: "username"
      # password: "password"
      # type: "token"
      # token: "token(The token can be obtained from the Authorization header of any API call of the product)"
      type : "openapicreds"
      access_id : "access_id"
      secret_key : "secret_key"
  co:
    base_url: "CO Base URL"
    # Example URL : "https://demo.cyware.com/soar/"
    auth:
      # type: "basic"
      # username: "username"
      # password: "password"
      # type: "token"
      # token: "token(The token can be obtained from the Authorization header of any API call of the product)"
      type : "openapicreds"
      access_id : "access_id"
      secret_key : "secret_key"
server:
  mcp_mode: "stdio"
  # For remote MCP, use: mcp_mode: "sse"
  # host: "0.0.0.0"
  # port: "5421"
  # base_path: "/mcp"  # optional, useful behind a reverse proxy
  # base_url: "https://your-domain.example.com/mcp" # optional, used to advertise message endpoint to clients
  # auth_token: "change-me" # optional; if set, require: Authorization: Bearer <auth_token>
